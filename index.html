<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />
    <title>Naver Map</title>
    <script
      type="text/javascript"
      src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=my6lb7zqun"
    ></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="map" style="width: 100%; height: 100%"></div>

    <script>
      var defaultPosition = new naver.maps.LatLng(37.5665, 126.9780);

      var mapOptions = {
        center: defaultPosition,
        zoom: 12,
      };

      var map = new naver.maps.Map('map', mapOptions);

      function postLocationToApp(position) {
        if (!window.ReactNativeWebView || !window.ReactNativeWebView.postMessage) {
          return;
        }

        window.ReactNativeWebView.postMessage(
          JSON.stringify({
            type: 'location',
            latitude: position.lat(),
            longitude: position.lng(),
          })
        );
      }

      function moveMap(latitude, longitude, shouldNotify) {
        var nextPosition = new naver.maps.LatLng(latitude, longitude);

        map.setCenter(nextPosition);

        if (shouldNotify) {
          postLocationToApp(nextPosition);
        }
      }

      window.setSelectedLocationFromNative = function (latitude, longitude) {
        moveMap(latitude, longitude, false);
      };

      naver.maps.Event.addListener(map, 'click', function (event) {
        moveMap(event.coord.lat(), event.coord.lng(), true);
      });
    </script>
  </body>
</html>
